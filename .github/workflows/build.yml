name: Build Firmware

on:
  push:
    branches: [dev, beta, master]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, needed for changelog + version.py git describe

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --quiet platformio

      - name: Prepare config.h
        run: cp src/config.h.example src/config.h

      # Derived here (not just for beta/master) so FW_VERSION is baked into
      # every build, including dev artifacts, and both boards embed the
      # identical string as the eventual GitHub release tag.
      - name: Derive version tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          if [ "${GITHUB_REF##*/}" = "beta" ]; then
            echo "tag=beta-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "name=Beta ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "dispatch_event=firmware-beta" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF##*/}" = "master" ]; then
            echo "tag=firmware-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "name=Firmware ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "dispatch_event=firmware-release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CoreInk
        env:
          FW_VERSION: ${{ steps.tag.outputs.tag }}
        run: pio run -e m5stack-coreink

      - name: Build StickC Plus2
        env:
          FW_VERSION: ${{ steps.tag.outputs.tag }}
        run: pio run -e m5stick-cplus2

      - name: Collect binaries
        run: |
          mkdir -p dist
          # CoreInk
          cp .pio/build/m5stack-coreink/bootloader.bin  dist/coreink-bootloader.bin
          cp .pio/build/m5stack-coreink/partitions.bin  dist/coreink-partitions.bin
          cp .pio/build/m5stack-coreink/firmware.bin    dist/coreink-app.bin
          # StickC
          cp .pio/build/m5stick-cplus2/bootloader.bin   dist/stickc-bootloader.bin
          cp .pio/build/m5stick-cplus2/partitions.bin   dist/stickc-partitions.bin
          cp .pio/build/m5stick-cplus2/firmware.bin     dist/stickc-app.bin
          ls -lh dist/

      # --- dev: build-only smoke test, no release, no downstream deploy ---
      - name: Upload dev build artifact
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-dev-${{ github.sha }}
          path: dist/*.bin
          retention-days: 14

      # --- beta / master: build a changelog since the last tag of the same tier ---
      - name: Build changelog
        if: github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/master'
        id: changelog
        run: |
          TIER="${GITHUB_REF##*/}"
          PREV_TAG=$(git tag --list "${TIER}-*" --sort=-creatordate | head -n1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty='- %s (%h)' -- src platformio.ini)
          else
            LOG=$(git log -n 20 --pretty='- %s (%h)' -- src platformio.ini)
          fi
          if [ -z "$LOG" ]; then LOG="- No source changes since ${PREV_TAG:-repo start}."; fi
          {
            echo "log<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          body: |
            Auto-built from commit ${{ github.sha }} on `${{ github.ref_name }}`.

            ${{ steps.tag.outputs.prerelease == 'true' && 'Beta build — flash via the web flasher beta channel before promoting to master.' || 'Stable release — flash via the web flasher: https://sunsamagotchi.marinbenke.dev' }}

            ## Changelog
            ${{ steps.changelog.outputs.log }}
          files: dist/*.bin
          fail_on_unmatched_files: true

      # Notify sunsamagotchi-web so it can pull this build onto the matching
      # channel (beta -> preview deploy, master -> production deploy).
      # Requires WEB_REPO_DISPATCH_TOKEN: a PAT with `repo` scope on
      # sunsamagotchi-web, since the default GITHUB_TOKEN can't trigger
      # workflows in another repository.
      - name: Notify web flasher repo
        if: github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.WEB_REPO_DISPATCH_TOKEN }}
        run: |
          gh api repos/MarinGHG/sunsamagotchi-web/dispatches \
            -f event_type="${{ steps.tag.outputs.dispatch_event }}" \
            -f "client_payload[tag]=${{ steps.tag.outputs.tag }}" \
            -f "client_payload[sha]=${{ github.sha }}"

[env:m5stack-coreink]
platform = espressif32
board = m5stack-coreink
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

lib_deps =
    m5stack/M5Unified@^0.2.2
    m5stack/M5GFX@^0.2.3
    bblanchon/ArduinoJson@^7.3.0

extra_scripts = pre:scripts/version.py
; Firmware doesn't use SPIFFS/LittleFS at all — min_spiffs trades that unused
; 1.5MB filesystem partition for a much bigger dual-OTA app slot (1.9MB vs
; 1.2MB each), which OTA needs headroom in for growth over time.
board_build.partitions = min_spiffs.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -DBOARD_COREINK

